<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/x-icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="theme-color" content="#08080f" />
    <meta name="description" content="Ad Vault — Spy on Winning Ads Before Your Competitors Do" />
    <link rel="manifest" href="%PUBLIC_URL%/site.webmanifest" />
    <title>AdVault</title>
    <style>
      *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; padding: 0; background: #08080f; color: #f0f0f8; font-family: system-ui, -apple-system, sans-serif; overscroll-behavior: none; -webkit-text-size-adjust: 100%; }
      img { -webkit-user-drag: none; user-select: none; display: block; }
      @keyframes spin { to { transform: rotate(360deg); } }
      @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
      @keyframes pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.1);opacity:.8} }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #08080f; }
      ::-webkit-scrollbar-thumb { background: rgba(108,71,255,.3); border-radius: 3px; }
      body { touch-action: manipulation; }
      * { touch-action: manipulation; }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      window.addEventListener('wheel', function(e) {
        if (e.ctrlKey) { e.preventDefault(); }
      }, { passive: false });
      window.addEventListener('keydown', function(e) {
        if (e.ctrlKey && (
          e.key === '+' || e.key === '-' || e.key === '=' ||
          e.key === '_' || e.key === '0' ||
          e.keyCode === 187 || e.keyCode === 189 || e.keyCode === 48
        )) { e.preventDefault(); }
      });
    </script>
  </body>
</html>
